}.gallery-page{padding:130px 4vw 100px}.gallery-page h1{font-size:clamp(65px,9vw,140px);line-height:.82;letter-spacing:-.075em;margin:45px 0 70px}
.gallery-row{

   .gallery-row:nth-child(even){grid-template-columns:1.2fr .8fr}.gallery-photo{min-height:480px;background-size:cover;background-position:center;transition:.5s;position:relative;overflow:hidden}.gallery-photo:hover{transform:scale(.985);box-shadow:18px 18px 0 var(--lime)}.gallery-copy{background:var(--card);padding:50px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line);transition:.35s}.gallery-copy:hover{transform:translateY(-8px)}.gallery-copy span{font-size:10px;letter-spacing:.2em;color:var(--soft)}.gallery-copy h2{font-size:clamp(38px,5vw,74px);line-height:.9;letter-spacing:-.06em;margin:18px 0}.gallery-copy p{color:var(--soft);line-height:1.7}.video-gallery{margin-top:90px;border-top:1px solid var(--line);padding-top:70px}.video-head{max-width:760px}.video-head>span{font-size:10px;letter-spacing:.2em;color:var(--soft)}.video-head h2{font-size:clamp(48px,7vw,100px);line-height:.88;letter-spacing:-.07em;margin:20px 0}.video-head p{color:var(--soft);line-height:1.7}.video-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:35px}.video-card{min-height:420px;background-size:cover;background-position:center;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:.4s}.video-card:after{content:"";position:absolute;inset:0;background:#0005}.video-card:hover{transform:translateY(-8px);box-shadow:16px 16px 0 var(--lime)}.video-card .play{position:relative;z-index:2;width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:var(--lime);color:#111;font-size:24px}.video-card b{position:absolute;left:22px;bottom:20px;z-index:2;color:white;font-size:12px;letter-spacing:.12em}.v1{background-image:url("https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=1200&q=85")}.v2{background-image:url("https://images.unsplash.com/photo-1492619375914-88005aa9e8fb?auto=format&fit=crop&w=1200&q=85")}@media(max-width:850px){.gallery-row,.gallery-row:nth-child(even),.video-grid{grid-template-columns:1fr}.gallery-photo{min-height:350px}.video-card{min-height:320px}}</style>
